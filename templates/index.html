<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
        }

        header {
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 24px;
            letter-spacing: 1px;
        }

        .hero {
            text-align: center;
            margin-top: 60px;
            animation: fadeIn 1.2s ease-in-out;
        }

        .hero h2 {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .hero p {
            opacity: 0.8;
        }

        .container {
            margin-top: 60px;
            display: flex;
            justify-content: center;
            gap: 50px;
            flex-wrap: wrap;
        }

        .card {
            width: 280px;
            height: 300px;
            background: rgba(255,255,255,0.08);
            border-radius: 20px;
            backdrop-filter: blur(12px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: 0.4s;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            animation: slideUp 1s ease forwards;
        }

        .card:hover {
            transform: translateY(-12px) scale(1.05);
        }

        .card h3 {
            margin-bottom: 15px;
        }

        .card p {
            font-size: 14px;
            opacity: 0.8;
            text-align: center;
            margin-bottom: 20px;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            background: #00c6ff;
            color: white;
            cursor: pointer;
            font-size: 14px;
            transition: 0.3s;
        }

        .btn:hover {
            background: #0072ff;
            transform: scale(1.1);
        }

        footer {
            text-align: center;
            margin-top: 60px;
            padding: 20px;
            font-size: 13px;
            opacity: 0.6;
        }

        /* Animations */
        @keyframes fadeIn {
            from {opacity: 0;}
            to {opacity: 1;}
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

    </style>
</head>

<body>

<header>
    <h1>AI Model Dashboard</h1>
</header>

<div class="hero">
    <h2>Machine Learning Control Panel</h2>
    <p>Train and test your models with a modern interface</p>
</div>

<div class="container">

    <!-- Test Model -->
    <div class="card">
        <h3>Test Model</h3>
        <p>Run predictions using trained models</p>
        <button class="btn" onclick="goToTest()">Test Model</button>
    </div>

    <!-- Train Model -->
    <div class="card">
        <h3>Train Model</h3>
        <p>Select and train machine learning models</p>

        <!-- IMPORTANT: GET request -->
        <form action="/train_model" method="get">
            <button class="btn" type="submit">Train Model</button>
        </form>
    </div>

</div>

<footer>
    © 2026 AI System | Flask Powered
</footer>

<script>
function goToTest() {
    window.location.href = "/predict";
}
</script>

</body>
</html>
